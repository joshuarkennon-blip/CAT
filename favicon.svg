<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Dark warm background -->
  <rect width="32" height="32" rx="6" fill="#1c0f08"/>

  <!-- Left ear -->
  <rect x="4" y="2" width="2" height="2" fill="#f07828"/>
  <rect x="3" y="4" width="4" height="2" fill="#f07828"/>
  <rect x="4" y="3" width="2" height="3" fill="#e06878"/>

  <!-- Right ear -->
  <rect x="26" y="2" width="2" height="2" fill="#f07828"/>
  <rect x="25" y="4" width="4" height="2" fill="#f07828"/>
  <rect x="26" y="3" width="2" height="3" fill="#e06878"/>

  <!-- Head -->
  <rect x="3" y="6" width="26" height="20" fill="#f07828"/>
  <rect x="5" y="26" width="22" height="3" fill="#f07828"/>
  <rect x="8" y="29" width="16" height="2" fill="#f07828"/>

  <!-- Left eye — green block + dark vertical pupil + highlight -->
  <rect x="6"  y="12" width="7" height="5" fill="#48c870"/>
  <rect x="9"  y="12" width="2" height="5" fill="#1c0f08"/>
  <rect x="6"  y="12" width="2" height="2" fill="#90e8b0"/>

  <!-- Right eye -->
  <rect x="19" y="12" width="7" height="5" fill="#48c870"/>
  <rect x="22" y="12" width="2" height="5" fill="#1c0f08"/>
  <rect x="19" y="12" width="2" height="2" fill="#90e8b0"/>

  <!-- Nose (pink triangle) -->
  <rect x="14" y="19" width="4" height="2" fill="#d05870"/>
  <rect x="13" y="21" width="6" height="2" fill="#d05870"/>

  <!-- Mouth corners -->
  <rect x="11" y="23" width="2" height="2" fill="#c84860"/>
  <rect x="19" y="23" width="2" height="2" fill="#c84860"/>
</svg>
