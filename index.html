<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CAT — Companion Analytics Toolkit</title>
    <meta
      name="description"
      content="CAT is the companion analytics toolkit. Audit GTM, check HAR files, review GA4, and route anything else through your orange companion."
    />
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles/tokens.css" />
    <link rel="stylesheet" href="./styles/base.css" />
    <link rel="stylesheet" href="./styles/components.css" />
    <link rel="stylesheet" href="./styles/scene.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div class="wordmark">CAT<span>.</span></div>
        <div class="header-meta">
          <span><span class="status-dot"></span>Ready</span>
          <span>v0.1</span>
        </div>
      </header>

      <main class="hero" data-hero>
        <!-- Full-bleed atmospheric background -->
        <div class="scene-wrapper" data-scene aria-hidden="true"></div>

        <!-- Cat: absolutely positioned over SVG desk zone by scene.js -->
        <div class="cat-stage hero__cat" data-cat data-state="idle"></div>

        <!-- Monitor UI: absolutely positioned over SVG monitor screen by scene.js -->
        <div class="hero__monitor-ui" data-monitor-ui>
          <div class="monitor-header">
            <span class="monitor-wordmark">CAT<span>.</span></span>
            <span class="monitor-status"><span class="status-dot"></span>Ready</span>
          </div>

          <h1 class="monitor-prompt">What can I help you with today?</h1>

          <form class="composer monitor-composer" data-composer autocomplete="off">
            <div class="composer__attachments" data-attachments hidden></div>

            <div
              class="composer__context"
              data-context-panel
              hidden
            >
              <label class="sr-only" for="composer-context">Context &amp; instructions</label>
              <textarea
                id="composer-context"
                class="composer__context-input"
                rows="2"
                placeholder="Context &amp; instructions (optional): focus areas, site details, business rules…"
                data-context-input
              ></textarea>
            </div>

            <div class="composer__row">
              <label class="sr-only" for="composer-input">Describe your problem</label>
              <textarea
                id="composer-input"
                class="composer__input"
                rows="1"
                placeholder="Describe your problem or select a tool."
                data-composer-input
              ></textarea>
              <button
                type="submit"
                class="composer__submit"
                data-composer-submit
                disabled
              >
                Run <span class="composer__submit-arrow">→</span>
              </button>
            </div>

            <div class="composer__toolbar">
              <div class="tool-select">
                <button
                  type="button"
                  class="tool-select__trigger"
                  data-tool-trigger
                  aria-haspopup="listbox"
                  aria-expanded="false"
                >
                  <span data-tool-label>No tool selected</span>
                  <svg class="tool-select__caret" viewBox="0 0 10 10" aria-hidden="true">
                    <path d="M 1 3 L 5 7 L 9 3" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </button>
                <div
                  class="tool-select__menu"
                  data-tool-menu
                  role="listbox"
                  data-open="false"
                ></div>
              </div>

              <button
                type="button"
                class="composer__ghost"
                data-attach-trigger
                aria-label="Attach files"
              >
                <svg class="composer__ghost-icon" viewBox="0 0 16 16" aria-hidden="true">
                  <path d="M10.5 3.5 5 9a2.5 2.5 0 0 0 3.5 3.5l6-6a4 4 0 0 0-5.7-5.7L2.5 7.6" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span>Attach</span>
              </button>

              <button
                type="button"
                class="composer__ghost"
                data-context-toggle
                aria-expanded="false"
                aria-controls="composer-context"
              >
                <svg class="composer__ghost-icon" viewBox="0 0 16 16" aria-hidden="true">
                  <path d="M2.5 3.5h11M2.5 8h11M2.5 12.5h7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                </svg>
                <span>Context</span>
              </button>

              <input
                type="file"
                class="sr-only"
                data-file-input
                multiple
                tabindex="-1"
                aria-hidden="true"
              />
            </div>
          </form>

          <div class="suggestions monitor-suggestions" data-examples></div>
        </div>
      </main>
    </div>

    <script>
      window.CAT_ASSET_CONFIG = {
        type: "video",
        src: "./new%20assets/hero-main-v2.mp4",
        poster: "./new%20assets/hero-main.png",
        stateSources: {
          idle:        "./new%20assets/hero-main-v2.mp4",
          attentive:   "./new%20assets/face-curious.mp4",
          active:      "./new%20assets/runner-right.mp4",
          celebratory: "./new%20assets/play-bow.mp4",
        },
        statePosterSources: {
          idle:        "./new%20assets/hero-main.png",
          attentive:   "./new%20assets/face-curious.png",
          active:      "./new%20assets/runner-right.png",
          celebratory: "./new%20assets/play-bow.png",
        },
      };
    </script>
    <script type="module" src="./scripts/app.js"></script>
  </body>
</html>
